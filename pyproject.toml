[project]
name = "m5-forecasting"
description = "Solution for the M5 Forecasting Competition"
version = "0.1.0"
readme = "README.md"
requires-python = ">=3.10,<3.11"
dependencies = [
    "fastparquet==2024.5.0",
    "isort==5.13.2",
    "jupyter==1.1.1",
    "loguru==0.7.2",
    "ipykernel>=6.9.0",
    "lightgbm==4.5.0",
    "mlforecast==0.13.4",
    "plotly==5.24.1",
    "seaborn==0.13.2",
    "statsforecast==1.7.8",
    "polars==1.21.0",
    "datasetsforecast==0.0.8",
]

[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[tool.uv]
dev-dependencies = []

[tool.black]
line-length = 120

[tool.isort]
skip_gitignore = true
atomic = true
profile = "black"
indent = 4
line_length = 88
lines_after_imports = 2
multi_line_output = 3
include_trailing_comma = true
